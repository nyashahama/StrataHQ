version: "2"

run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - nilerr

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true

issues:
  exclude-dirs:
    - db/gen
